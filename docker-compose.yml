version: '3.8'

x-airflow-common:
  &airflow-common
  build:
    context: ./docker/airflow
    dockerfile: Dockerfile
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DATABASE_USER:-airflow}:${AIRFLOW_DATABASE_PASSWORD:-airflow}@postgres/${AIRFLOW_DATABASE_DB:-airflow}
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: ${AIRFLOW__CORE__LOAD_EXAMPLES:-false}
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session'
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    &airflow-common-depends-on
    postgres:
      condition: service_healthy

services:
  # ======================================
  # KAFKA CLUSTER
  # ======================================
  zookeeper:
    image: bitnami/zookeeper:3.9.1
    ports:
      - "2181:2181"
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
    networks:
      - default_net

  kafka:
    image: bitnami/kafka:3.7.0
    ports:
      - "${KAFKA_PORT:-9092}:${KAFKA_PORT:-9092}"
    environment:
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:${KAFKA_PORT:-9092}
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:${KAFKA_PORT:-9092}
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
      - ALLOW_PLAINTEXT_LISTENER=yes
    depends_on:
      - zookeeper
    networks:
      - default_net

  # ======================================
  # MINIO DATA LAKE
  # ======================================
  minio:
    image: minio/minio
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - default_net

  minio-mc:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      /usr/bin/mc mb myminio/${MINIO_DEFAULT_BUCKET:-nyc-taxi-data} --ignore-existing;
      /usr/bin/mc anonymous set public myminio/${MINIO_DEFAULT_BUCKET:-nyc-taxi-data};
      exit 0;
      "
    networks:
      - default_net

  # ======================================
  # POSTGRES DATA WAREHOUSE
  # ======================================
  postgres-dwh:
    image: postgres:13
    ports:
      - "${DWH_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${DWH_DATABASE_USER:-dwhuser}
      POSTGRES_PASSWORD: ${DWH_DATABASE_PASSWORD:-dwhpassword}
      POSTGRES_DB: ${DWH_DATABASE_DB:-nyctaxi_dwh}
    volumes:
      - postgres-dwh-volume:/var/lib/postgresql/data
    networks:
      - default_net

  # ======================================
  # APACHE SPARK
  # ======================================
  spark-master:
    build:
      context: ./docker/spark
      dockerfile: Dockerfile
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
    ports:
      - "${SPARK_WEBUI_PORT:-8080}:8080"
      - "${SPARK_MASTER_PORT:-7077}:7077"
    networks:
      - default_net

  spark-worker:
    build:
      context: ./docker/spark
      dockerfile: Dockerfile
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:${SPARK_MASTER_PORT:-7077}
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
    ports:
      - "${SPARK_WORKER_WEBUI_PORT:-8081}:8081"
    depends_on:
      - spark-master
    networks:
      - default_net

  # ======================================
  # APACHE AIRFLOW
  # ======================================
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: ${AIRFLOW_DATABASE_USER:-airflow}
      POSTGRES_PASSWORD: ${AIRFLOW_DATABASE_PASSWORD:-airflow}
      POSTGRES_DB: ${AIRFLOW_DATABASE_DB:-airflow}
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${AIRFLOW_DATABASE_USER:-airflow}"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always
    networks:
      - default_net

  airflow-init:
    <<: *airflow-common
    command: version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_UPGRADE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
    depends_on:
      postgres:
        condition: service_healthy

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "${AIRFLOW_PORT:-8085}:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres-db-volume:
  postgres-dwh-volume:
  minio-data:

networks:
  default_net:
    driver: bridge
