version: '3.8'

x-airflow-common: &airflow-common
  build:
    context: ./docker/airflow
    dockerfile: Dockerfile
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DATABASE_USER}:${AIRFLOW_DATABASE_PASSWORD}@postgres/${AIRFLOW_DATABASE_DB}
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: ${AIRFLOW__CORE__LOAD_EXAMPLES}
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session'
    AIRFLOW_CONN_SPARK_DEFAULT: '{"conn_type": "spark", "host": "spark://spark-master", "port": 7077}'
    DWH_PORT: ${DWH_PORT}
    DWH_DATABASE_USER: ${DWH_DATABASE_USER}
    DWH_DATABASE_PASSWORD: ${DWH_DATABASE_PASSWORD}
    DWH_DATABASE_DB: ${DWH_DATABASE_DB}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ./jobs:/opt/airflow/jobs
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on: &airflow-common-depends-on
    postgres:
      condition: service_healthy
  networks:
    - default_net

services:
  # ======================================
  # KAFKA CLUSTER
  # ======================================
  kafka:
    image: apache/kafka:3.7.0
    ports:
      - "${KAFKA_PORT:-9092}:9092"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    networks:
      - default_net

  # ======================================
  # MINIO DATA LAKE
  # ======================================
  minio:
    image: minio/minio
    ports:
      - "${MINIO_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - default_net

  minio-mc:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c " /usr/bin/mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}; /usr/bin/mc mb myminio/${MINIO_DEFAULT_BUCKET:-nyc-taxi-data} --ignore-existing; /usr/bin/mc anonymous set public myminio/${MINIO_DEFAULT_BUCKET:-nyc-taxi-data}; exit 0; "
    networks:
      - default_net

  # ======================================
  # POSTGRES DATA WAREHOUSE
  # ======================================
  postgres-dwh:
    image: postgres:13
    ports:
      - "${DWH_PORT}:5432"
    environment:
      POSTGRES_USER: ${DWH_DATABASE_USER}
      POSTGRES_PASSWORD: ${DWH_DATABASE_PASSWORD}
      POSTGRES_DB: ${DWH_DATABASE_DB}
    volumes:
      - postgres-dwh-volume:/var/lib/postgresql/data
    networks:
      - default_net

  # ======================================
  # APACHE SPARK
  # ======================================
  spark-master:
    build:
      context: ./docker/spark
      dockerfile: Dockerfile
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    environment:
      - SPARK_LOCAL_HOSTNAME=spark-master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
      - DWH_PORT=${DWH_PORT}
      - DWH_DATABASE_USER=${DWH_DATABASE_USER}
      - DWH_DATABASE_PASSWORD=${DWH_DATABASE_PASSWORD}
      - DWH_DATABASE_DB=${DWH_DATABASE_DB}
    ports:
      - "${SPARK_WEBUI_PORT}:8080"
      - "${SPARK_MASTER_PORT}:7077"
    volumes:
      - ./data:/opt/spark/data
      - ./jobs:/opt/spark/jobs
    networks:
      - default_net

  spark-worker:
    build:
      context: ./docker/spark
      dockerfile: Dockerfile
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:${SPARK_MASTER_PORT}
    environment:
      - SPARK_LOCAL_HOSTNAME=spark-worker
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
      - DWH_PORT=${DWH_PORT}
      - DWH_DATABASE_USER=${DWH_DATABASE_USER}
      - DWH_DATABASE_PASSWORD=${DWH_DATABASE_PASSWORD}
      - DWH_DATABASE_DB=${DWH_DATABASE_DB}
    ports:
      - "${SPARK_WORKER_WEBUI_PORT}:8081"
    volumes:
      - ./data:/opt/spark/data
      - ./jobs:/opt/spark/jobs
    depends_on:
      - spark-master
    networks:
      - default_net

  # ======================================
  # APACHE AIRFLOW
  # ======================================
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: ${AIRFLOW_DATABASE_USER}
      POSTGRES_PASSWORD: ${AIRFLOW_DATABASE_PASSWORD}
      POSTGRES_DB: ${AIRFLOW_DATABASE_DB}
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "${AIRFLOW_DATABASE_USER}" ]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always
    networks:
      - default_net

  airflow-init:
    <<: *airflow-common
    command: version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_UPGRADE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "${AIRFLOW_PORT}:8080"
    healthcheck:
      test: [ "CMD", "curl", "--fail", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: [ "CMD", "curl", "--fail", "http://localhost:8974/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
  # ======================================
  # APACHE SUPERSET
  # ======================================
  superset-init:
    image: apache/superset:latest
    environment:
      - SUPERSET_SECRET_KEY=${SUPERSET_SECRET_KEY}
    volumes:
      - superset-data:/app/superset_home
    command: >
      /bin/sh -c "
        superset db upgrade &&
        superset fab create-admin --username admin --firstname Admin --lastname Admin --email admin@example.com --password admin || true &&
        superset init
      "
    networks:
      - default_net

  superset:
    image: apache/superset:latest
    ports:
      - "${SUPERSET_PORT}:8088"
    environment:
      - SUPERSET_SECRET_KEY=${SUPERSET_SECRET_KEY}
    volumes:
      - superset-data:/app/superset_home
    depends_on:
      superset-init:
        condition: service_completed_successfully
      postgres-dwh:
        condition: service_started
    networks:
      - default_net

volumes:
  postgres-db-volume:
  postgres-dwh-volume:
  minio-data:
  superset-data:

networks:
  default_net:
    driver: bridge
